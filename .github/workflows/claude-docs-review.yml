name: Claude Docs Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "docs/**"
      - "src/pages/**"
      - "static/llms.txt"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review the documentation changes in this PR against the conventions
            in AGENTS.md at the repo root. Specifically check:

            1. Each changed or added page under docs/ is in the folder matching
               its actual Diátaxis type (tutorial, how-to, reference, explanation).
            2. Front matter includes title, sidebar_label, description, and
               sidebar_position.
            3. If a page was added, removed, or renamed under docs/ or
               src/pages/, confirm static/llms.txt was updated to match.
            4. Internal links in changed files point to pages that actually
               exist in this repo.
            5. Code samples are complete and runnable, not placeholders.

            Post a PR review comment summarizing what passes and what needs
            fixing. Be specific about file names and line numbers.
          claude_args: "--max-turns 15"
