name: Claude Docs Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "docs/**"
      - "src/pages/**"
      - "static/llms.txt"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run `git diff origin/${{ github.base_ref }}...HEAD --name-status` to
            see exactly which files changed in this PR. Only inspect those
            files (and AGENTS.md at the repo root) — do not explore the rest
            of the repo.

            Check the changed files against AGENTS.md's conventions:

            1. Pages under docs/ are in the folder matching their Diátaxis
               type (tutorial, how-to, reference, explanation).
            2. Front matter includes title, sidebar_label, description, and
               sidebar_position.
            3. If a page was added, removed, or renamed under docs/ or
               src/pages/, static/llms.txt was updated in this same diff.
            4. Any new internal links in the changed files point to pages
               that exist in this repo (check with a quick file lookup, not
               a full repo crawl).
            5. Code samples in the diff are complete and runnable, not
               placeholders.

            Post one PR comment (via `gh pr comment`) summarizing what passes
            and what needs fixing, citing file names and line numbers. Keep
            the review to the diff only — be concise and move quickly.
          claude_args: "--max-turns 20"
