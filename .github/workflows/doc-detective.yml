name: doc-detective

on:
  pull_request:
    paths:
      - "docs/**"
      - "src/pages/**"
      - ".doc-detective.json"

jobs:
  runTests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write .env from repository secrets
        run: |
          {
            printf 'PROVE_CLIENT_ID=%s\nPROVE_CLIENT_SECRET=%s\n' \
              "${{ secrets.PROVE_CLIENT_ID }}" "${{ secrets.PROVE_CLIENT_SECRET }}"
            printf 'PROVE_EU_CLIENT_ID=%s\nPROVE_EU_CLIENT_SECRET=%s\n' \
              "${{ secrets.PROVE_EU_CLIENT_ID }}" "${{ secrets.PROVE_EU_CLIENT_SECRET }}"
            printf 'PROVE_HA_CLIENT_ID=%s\nPROVE_HA_CLIENT_SECRET=%s\n' \
              "${{ secrets.PROVE_HA_CLIENT_ID }}" "${{ secrets.PROVE_HA_CLIENT_SECRET }}"
          } > .env
      - uses: doc-detective/github-action@v1
        with:
          version: latest
          config: .doc-detective.json
          exit_on_fail: true
